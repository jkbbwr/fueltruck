name: Build & Push

# Manual only — run from the Actions tab (or `gh workflow run "Build & Push"`).
on:
  workflow_dispatch:

env:
  # Match the Dockerfile's builder (mix.exs requires elixir ~> 1.17).
  ELIXIR_VERSION: "1.17.3"
  OTP_VERSION: "27.1.2"
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: Compile & test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      # Cache deps + build keyed on the lockfile (nosedrum is a git dep).
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - run: mix deps.get
      - run: mix compile
      - run: mix test

  build-push:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=long

      # Native amd64 build (the deploy target). Building amd64 here avoids the QEMU
      # BEAM-JIT segfault seen when cross-building on arm64.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          # Push a plain single-platform image manifest. Without these, v6 attaches
          # provenance/SBOM attestations, producing an OCI index with an "unknown/unknown"
          # entry that GHCR shows as a build artifact rather than a runnable image.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
